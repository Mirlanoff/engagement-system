# ================================================================
#  docker-compose.override.yml — ТОЛЬКО ДЛЯ РАЗРАБОТКИ
#  Автоматически применяется поверх docker-compose.yml
#  НЕ КОММИТЬ .env, НЕ ИСПОЛЬЗОВАТЬ В ПРОДАКШЕНЕ
# ================================================================

services:

  laravel:
    build:
      target: production  # можно сменить на dev stage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      - ./backend:/var/www/html  # hot reload исходников
    ports:
      - "9000:9000"  # прямой доступ к PHP-FPM для отладки

  ml-service:
    environment:
      LOG_LEVEL: DEBUG
      FRAME_INTERVAL_SECONDS: "10"  # реже захватывать кадры
    ports:
      - "8001:8001"  # прямой доступ к FastAPI docs
    deploy:
      resources:
        limits:
          cpus: "1.5"   # понижено с 4, чтобы запускалось на 2-CPU dev-машинах
          memory: 3g

  celery-worker:
    deploy:
      resources:
        limits:
          cpus: "1.0"   # понижено с 4, чтобы запускалось на 2-CPU dev-машинах
          memory: 2g

  postgres:
    ports:
      - "5432:5432"  # подключение из IDE (TablePlus, DBeaver)

  redis:
    ports:
      - "6379:6379"  # Redis Insight / redis-cli

  soketi:
    environment:
      SOKETI_DEBUG: "1"
    ports:
      - "6001:6001"

  flower:
    ports:
      - "5555:5555"

  # Mailpit — перехват email в dev среде
  mailpit:
    image: axllent/mailpit:latest
    container_name: engage_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - engagement_net

  # RTSP-сервер для тестирования с веб-камерой ноутбука
  # ffmpeg на хосте пушит поток с камеры → mediamtx → ml-service читает
  rtsp-server:
    image: bluenviron/mediamtx:latest
    container_name: engage_rtsp
    restart: unless-stopped
    environment:
      MTX_PROTOCOLS: tcp
      MTX_RTSPADDRESS: ":8554"
      MTX_LOGLEVEL: info
    ports:
      - "8554:8554"
    networks:
      - engagement_net
