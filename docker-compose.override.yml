# ================================================================
#  docker-compose.override.yml — ТОЛЬКО ДЛЯ РАЗРАБОТКИ
#  Автоматически применяется поверх docker-compose.yml.
#
#  ВАЖНО: не переопределяем nginx — основной compose уже собирает
#  его из ./frontend/Dockerfile с вшитым Vue-билдом. Любые volumes
#  здесь затирают webroot и дают пустую страницу / 403.
# ================================================================

services:

  laravel:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    ports:
      - "127.0.0.1:9000:9000"

  ml-service:
    environment:
      LOG_LEVEL: DEBUG
      FRAME_INTERVAL_SECONDS: "10"
    ports:
      - "127.0.0.1:8001:8001"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 3g

  celery-worker:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  soketi:
    environment:
      SOKETI_DEBUG: "1"

  mailpit:
    image: axllent/mailpit:latest
    container_name: engage_mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - engagement_net

  rtsp-server:
    image: bluenviron/mediamtx:latest
    container_name: engage_rtsp
    restart: unless-stopped
    environment:
      MTX_PROTOCOLS: tcp
      MTX_RTSPADDRESS: ":8554"
      MTX_LOGLEVEL: info
    ports:
      - "127.0.0.1:8554:8554"
    networks:
      - engagement_net
