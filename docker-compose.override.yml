# ================================================================
#  docker-compose.override.yml — ТОЛЬКО ДЛЯ РАЗРАБОТКИ
#  Автоматически применяется поверх docker-compose.yml
#  НЕ КОММИТЬ .env, НЕ ИСПОЛЬЗОВАТЬ В ПРОДАКШЕНЕ
# ================================================================

version: "3.9"

services:

  laravel:
    build:
      target: production  # можно сменить на dev stage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      - ./backend:/var/www/html  # hot reload исходников
    ports:
      - "9000:9000"  # прямой доступ к PHP-FPM для отладки

  ml-service:
    environment:
      LOG_LEVEL: DEBUG
      FRAME_INTERVAL_SECONDS: "10"  # реже захватывать кадры
    ports:
      - "8001:8001"  # прямой доступ к FastAPI docs

  postgres:
    ports:
      - "5432:5432"  # подключение из IDE (TablePlus, DBeaver)

  redis:
    ports:
      - "6379:6379"  # Redis Insight / redis-cli

  soketi:
    environment:
      SOKETI_DEBUG: "1"
    ports:
      - "6001:6001"

  flower:
    ports:
      - "5555:5555"

  # Mailpit — перехват email в dev среде
  mailpit:
    image: axllent/mailpit:latest
    container_name: engage_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - engagement_net
