version: "3.9"

# =============================================================
#  STUDENT ENGAGEMENT MONITORING SYSTEM — Docker Compose Stack
#  On-premise школьный сервер
#  Сервисы: nginx, laravel, vue-builder, ml-service, postgres,
#           redis, soketi, horizon, celery, flower, grafana, prometheus
# =============================================================

networks:
  engagement_net:
    driver: bridge
  monitoring_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
  grafana_data:
  prometheus_data:
  ml_models_cache:

x-laravel-env: &laravel-env
  APP_NAME: "EngagementMonitor"
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:-https://localhost}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-engagement_db}
  DB_USERNAME: ${DB_USERNAME:-engage_user}
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  CACHE_DRIVER: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  BROADCAST_DRIVER: pusher
  PUSHER_APP_ID: ${PUSHER_APP_ID:-engagement_app}
  PUSHER_APP_KEY: ${PUSHER_APP_KEY:-engagement_key}
  PUSHER_APP_SECRET: ${PUSHER_APP_SECRET}
  PUSHER_HOST: soketi
  PUSHER_PORT: 6001
  PUSHER_SCHEME: http
  ML_SERVICE_URL: http://ml-service:8001
  ML_SERVICE_SECRET: ${ML_SERVICE_SECRET}
  CLAUDE_API_KEY: ${CLAUDE_API_KEY}

# ─────────────────────────────────────────────────────────────
services:

  # ── 1. NGINX — reverse proxy + SSL termination ──────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: engage_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - storage_data:/var/www/html/storage/app/public:ro
    depends_on:
      - laravel
    networks:
      - engagement_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── 2. LARAVEL — основной бэкенд ────────────────────────────
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: engage_laravel
    restart: unless-stopped
    environment:
      <<: *laravel-env
    volumes:
      - storage_data:/var/www/html/storage
      - ./backend:/var/www/html:cached
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - engagement_net
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ── 3. LARAVEL HORIZON — очередь задач ──────────────────────
  horizon:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: engage_horizon
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    environment:
      <<: *laravel-env
    volumes:
      - storage_data:/var/www/html/storage
      - ./backend:/var/www/html:cached
    depends_on:
      laravel:
        condition: service_healthy
    networks:
      - engagement_net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── 4. LARAVEL SCHEDULER — cron задачи ──────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: engage_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"
    environment:
      <<: *laravel-env
    volumes:
      - storage_data:/var/www/html/storage
      - ./backend:/var/www/html:cached
    depends_on:
      laravel:
        condition: service_healthy
    networks:
      - engagement_net

  # ── 5. VUE.JS — фронтенд (сборка + раздача через nginx) ─────
  vue-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: engage_vue_builder
    volumes:
      - ./frontend:/app
      - ./docker/nginx/html:/app/dist
    environment:
      VITE_API_URL: ${APP_URL:-https://localhost}/api
      VITE_PUSHER_APP_KEY: ${PUSHER_APP_KEY:-engagement_key}
      VITE_PUSHER_HOST: ${APP_URL:-localhost}
      VITE_PUSHER_PORT: 443
      VITE_PUSHER_SCHEME: wss
    profiles:
      - build
    networks:
      - engagement_net

  # ── 6. ML SERVICE — Python FastAPI + CV анализ ──────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: engage_ml
    restart: unless-stopped
    environment:
      LARAVEL_API_URL: http://nginx/api/internal
      LARAVEL_API_SECRET: ${ML_SERVICE_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      FRAME_INTERVAL_SECONDS: ${FRAME_INTERVAL:-5}
      MAX_WORKERS: ${ML_MAX_WORKERS:-4}
      MODEL_BACKEND: ${ML_MODEL_BACKEND:-opencv}  # opencv | mediapipe | deepface
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ml_models_cache:/app/models_cache
      - ./ml-service:/app:cached
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - engagement_net
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 3G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── 7. CELERY WORKER — async ML jobs ────────────────────────
  celery-worker:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: engage_celery
    restart: unless-stopped
    command: >
      celery -A app.worker worker
      --loglevel=info
      --concurrency=4
      --queues=frame_analysis,scoring,alerts
      --hostname=worker@%h
    environment:
      LARAVEL_API_URL: http://nginx/api/internal
      LARAVEL_API_SECRET: ${ML_SERVICE_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - ml_models_cache:/app/models_cache
      - ./ml-service:/app:cached
    depends_on:
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - engagement_net
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G

  # ── 8. CELERY BEAT — периодические задачи ML ────────────────
  celery-beat:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: engage_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.worker beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - ./ml-service:/app:cached
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - engagement_net

  # ── 9. FLOWER — мониторинг Celery задач ─────────────────────
  flower:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: engage_flower
    restart: unless-stopped
    command: >
      celery -A app.worker flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      - redis
    networks:
      - engagement_net
      - monitoring_net
    ports:
      - "127.0.0.1:5556:5555"

  # ── 10. SOKETI — self-hosted Pusher / WebSocket сервер ──────
  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: engage_soketi
    restart: unless-stopped
    environment:
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID:-engagement_app}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY:-engagement_key}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET}
      SOKETI_DB_REDIS_HOST: redis
      SOKETI_DB_REDIS_PORT: 6379
      SOKETI_DB_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SOKETI_DEBUG: ${SOKETI_DEBUG:-0}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - engagement_net
    ports:
      - "127.0.0.1:6002:6001"

  # ── 11. POSTGRESQL — основная БД ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: engage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-engagement_db}
      POSTGRES_USER: ${DB_USERNAME:-engage_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - engagement_net
      - monitoring_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-engage_user} -d ${DB_DATABASE:-engagement_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  # ── 12. REDIS — кэш, очереди, pub/sub ───────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: engage_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - engagement_net
      - monitoring_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 13. PROMETHEUS — сбор метрик ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: engage_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_net
    ports:
      - "127.0.0.1:9090:9090"

  # ── 14. GRAFANA — визуализация метрик ───────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: engage_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: ${APP_URL:-https://localhost}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "redis-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitoring_net
    ports:
      - "127.0.0.1:3000:3000"
