# ================================================================
#  HTTPS / port 443 — для self-signed сертификата.
#  Сертификат и ключ ожидаем по /etc/nginx/ssl/server.{crt,key}
#  (они генерируются ./scripts/manage.sh install).
# ================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Большой кадр от браузерной веб-камеры (~80 KB JPEG, base64 ~110 KB).
    # На всякий случай поднимаем лимит — кадры могут быть и крупнее.
    client_max_body_size 16M;

    # Используем встроенный Docker DNS (127.0.0.11), чтобы при пересоздании
    # backend-контейнера nginx ререзолвил имя в новый IP. Без этого nginx
    # кэширует IP при старте → после --force-recreate ловим 502.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $laravel_upstream "laravel:9000";
    set $soketi_upstream  "soketi:6001";

    location /api {
        fastcgi_pass $laravel_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        fastcgi_param SERVER_NAME     $server_name;
        fastcgi_param SERVER_PORT     $server_port;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param HTTP_HOST       $http_host;
        fastcgi_param HTTPS           on;
        fastcgi_read_timeout 300;
        include fastcgi_params;
    }

    location /sanctum {
        fastcgi_pass $laravel_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        include fastcgi_params;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /app {
        proxy_pass         http://$soketi_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
