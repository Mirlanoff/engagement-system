# ================================================================
#  HTTPS / port 443 — ЕДИНАЯ точка входа.
#  - / .............. Vue SPA (дашборд)
#  - /api ........... Laravel API (php-fpm)
#  - /sanctum ....... Laravel auth
#  - /app ........... Soketi WebSocket
#  - /grafana ....... Grafana (служебное)
#
#  Сертификат генерируется scripts/manage.sh install и монтируется
#  из ./docker/nginx/ssl в /etc/nginx/ssl.
# ================================================================
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Кадры от браузерной веб-камеры (~80 KB JPEG, base64 ~110 KB)
    client_max_body_size 16M;

    # ── Laravel API ─────────────────────────────────────────────
    location /api {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        fastcgi_param SERVER_NAME     $server_name;
        fastcgi_param SERVER_PORT     $server_port;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param HTTP_HOST       $http_host;
        fastcgi_param HTTPS           on;
        fastcgi_read_timeout 300;
        include fastcgi_params;
    }

    location /sanctum {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTPS           on;
        include fastcgi_params;
    }

    # ── WebSocket (Soketi) ──────────────────────────────────────
    location /app {
        proxy_pass         http://soketi:6001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Grafana (служебное) ─────────────────────────────────────
    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Grafana WebSocket для live-графиков
    location /grafana/api/live/ {
        proxy_pass         http://grafana:3000/api/live/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Vue SPA — всё остальное ─────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
