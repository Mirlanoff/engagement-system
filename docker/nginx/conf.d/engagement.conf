# ================================================================
#  HTTP / port 80
#  Внешний трафик → 301 на HTTPS (единая точка входа https://localhost).
#  Внутренний /api/internal/ (ML-сервис → Laravel) — работает по HTTP,
#  потому что это трафик внутри docker network, он не выходит наружу.
# ================================================================
server {
    listen 80 default_server;
    server_name _;

    # ACME challenge (на будущее, для Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Internal API (ML → Laravel) ────────────────────────────
    # FastCGI напрямую в php-fpm, без редиректа на HTTPS.
    location /api/internal {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        fastcgi_param SERVER_NAME     $server_name;
        fastcgi_param SERVER_PORT     $server_port;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param HTTP_HOST       $http_host;
        fastcgi_param HTTPS           off;
        fastcgi_read_timeout 300;
        client_max_body_size 16M;
        include fastcgi_params;
    }

    # Остальное — на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
