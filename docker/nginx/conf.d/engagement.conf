# ================================================================
#  HTTP / port 80 — редирект всего трафика на HTTPS.
#  Единая точка входа: https://localhost
# ================================================================
server {
    listen 80 default_server;
    server_name _;

    # Единственное исключение — ACME challenge (для будущего Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
