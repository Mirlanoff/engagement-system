# ================================================================
#  PostgreSQL 16 — настройки для школьного сервера (8–16 GB RAM)
#  Оптимизировано под timeseries engagement данные
# ================================================================
listen_addresses = '*'
# ── Соединения ───────────────────────────────────────────────────
max_connections = 100
superuser_reserved_connections = 3

# ── Память (настрой под свой сервер) ─────────────────────────────
shared_buffers         = 2GB          # 25% от RAM
effective_cache_size   = 6GB          # 75% от RAM
work_mem               = 64MB
maintenance_work_mem   = 512MB
wal_buffers            = 64MB

# ── Query planner ────────────────────────────────────────────────
random_page_cost       = 1.1          # SSD
effective_io_concurrency = 200        # SSD
default_statistics_target = 100

# ── WAL / Checkpoint ─────────────────────────────────────────────
wal_level              = replica
max_wal_size           = 2GB
min_wal_size           = 256MB
checkpoint_completion_target = 0.9

# ── Параллелизм ──────────────────────────────────────────────────
max_worker_processes        = 8
max_parallel_workers        = 4
max_parallel_workers_per_gather = 2

# ── Логирование медленных запросов ───────────────────────────────
log_min_duration_statement  = 500     # ms — логируй запросы > 500ms
log_line_prefix             = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints             = on
log_connections             = off
log_disconnections          = off
log_lock_waits              = on

# ── Autovacuum (важно для timeseries таблиц) ─────────────────────
autovacuum_vacuum_scale_factor   = 0.05
autovacuum_analyze_scale_factor  = 0.02
autovacuum_vacuum_cost_delay     = 2ms
